# Rust workspace tasks.

# Lint
# | task          | type      | cwd |
# | ------------- | --------- | --- |
# | lint          | composite |     |
# | lint-fix      | composite |     |
# | lint-rust     | command   |     |
# | lint-fix-rust | extend    |     |
# | lint-vstyle   | command   |     |
# | lint-fix-vstyle | command |     |

[tasks.lint]
workspace = false
dependencies = [
	"lint-rust",
	"lint-vstyle",
]

[tasks.lint-fix]
workspace = false
dependencies = [
	"lint-fix-rust",
	"lint-fix-vstyle",
]

[tasks.lint-rust]
workspace = false
command = "cargo"
args = [
	"clippy",
	"--all-features",
	"--all-targets",
	"--workspace",
	"--",
	"-D",
	"clippy::all",
	"-D",
	"clippy::too_many_lines",
	"-D",
	"clippy::unwrap_used",
	"-D",
	"clippy::use_self",
	"-D",
	"clippy::wildcard_imports",
	"-D",
	"missing-docs",
	"-D",
	"unused-crate-dependencies",
	"-D",
	"warnings",
]

[tasks.lint-fix-rust]
extend = "lint-rust"
args = [
	"clippy",
	"--fix",
	"--allow-dirty",
	"--all-features",
	"--all-targets",
	"--workspace",
	"--",
	"-D",
	"clippy::all",
	"-D",
	"clippy::too_many_lines",
	"-D",
	"clippy::unwrap_used",
	"-D",
	"clippy::use_self",
	"-D",
	"clippy::wildcard_imports",
	"-D",
	"missing-docs",
	"-D",
	"unused-crate-dependencies",
	"-D",
	"warnings",
]

[tasks.lint-vstyle]
workspace = false
command = "cargo"
args = [
	"vstyle",
	"curate",
	"--language",
	"rust",
	"--workspace",
	"--all-features"
]

[tasks.lint-fix-vstyle]
workspace = false
command = "cargo"
args = [
	"vstyle",
	"tune",
	"--language",
	"rust",
	"--workspace",
	"--all-features",
	"--strict",
]


# Test
# | task      | type      | cwd       |
# | --------- | --------- | ---       |
# | test      | composite |           |
# | test-rust | command   |           |
# | test-all  | composite |           |
# | test-rust-all | command |         |
# | test-integration      | composite |
# | test-integration-rust | command   |

[tasks.test]
workspace = false
dependencies = [
	"test-rust",
]

[tasks.test-rust]
workspace = false
command = "cargo"
args = [
	"nextest",
	"run",
	"--workspace",
	"--all-targets",
	"--all-features",
]

[tasks.test-all]
workspace = false
dependencies = [
	"test-rust-all",
]

[tasks.test-rust-all]
workspace = false
command = "cargo"
args = [
	"nextest",
	"run",
	"--workspace",
	"--all-targets",
	"--all-features",
	"--run-ignored",
	"all",
]

[tasks.test-integration]
workspace = false
dependencies = [
	"test-integration-rust",
]

[tasks.test-integration-rust]
workspace = false
command = "cargo"
args = [
	"nextest",
	"run",
	"--workspace",
	"--all-targets",
	"--all-features",
	"--run-ignored",
	"only",
]


# Format
# | task           | type      | cwd |
# | -------------- | --------- | --- |
# | fmt            | composite |     |
# | fmt-check      | composite |     |
# | fmt-rust       | command   |     |
# | fmt-rust-check | extend    |     |
# | fmt-toml       | command   |     |
# | fmt-toml-check | extend    |     |

[tasks.fmt]
workspace = false
dependencies = [
	"fmt-rust",
	"fmt-toml",
]

[tasks.fmt-check]
workspace = false
dependencies = [
	"fmt-rust-check",
	"fmt-toml-check",
]

[tasks.fmt-rust]
workspace = false
command = "rustup"
args = [
	"run",
	"nightly",
	"cargo",
	"fmt",
	"--all",
]

[tasks.fmt-rust-check]
workspace = false
command = "rustup"
args = [
	"run",
	"nightly",
	"cargo",
	"fmt",
	"--all",
	"--",
	"--check",
]

[tasks.fmt-toml]
workspace = false
command = "taplo"
args = [
	"fmt",
]

[tasks.fmt-toml-check]
extend = "fmt-toml"
args = [
	"fmt",
	"--check",
]

# E2E
# | task                           | type      | cwd |
# | ------------------------------ | --------- | --- |
# | e2e                            | composite |     |
# | e2e-context-misranking-harness | command   |     |
# | e2e-consolidation-harness      | command   |     |

[tasks.e2e]
workspace = false
dependencies = [
	"e2e-context-misranking-harness",
]

[tasks.e2e-context-misranking-harness]
workspace = false
command = "bash"
args = [
	"scripts/context-misranking-harness.sh",
]

[tasks.e2e-consolidation-harness]
workspace = false
command = "bash"
args = [
	"scripts/consolidation-harness.sh",
]


# Competitive parity
# | task                | type    | cwd |
# | ------------------- | ------- | --- |
# | parity-docker       | command |     |
# | parity-docker-clean | command |     |

[tasks.parity-docker]
workspace = false
command = "docker"
args = [
	"compose",
	"-f",
	"docker-compose.parity.yml",
	"run",
	"--build",
	"--rm",
	"parity-runner",
]

[tasks.parity-docker-clean]
workspace = false
command = "docker"
args = [
	"compose",
	"-f",
	"docker-compose.parity.yml",
	"down",
	"-v",
	"--remove-orphans",
]


# Live external baseline benchmark
# | task                       | type    | cwd |
# | -------------------------- | ------- | --- |
# | baseline-live-docker       | command |     |
# | baseline-backfill-docker   | command |     |
# | baseline-live-report       | command |     |
# | baseline-live-docker-clean | command |     |
# | baseline-production-synthetic | command | |
# | baseline-production-private | command |   |

[tasks.baseline-live-docker]
workspace = false
command = "bash"
args = [
	"-lc",
	"set -euo pipefail; head=\"$(git rev-parse HEAD)\"; if [ -n \"$(git status --porcelain)\" ]; then head=\"$head+dirty\"; fi; export ELF_BASELINE_ELF_HEAD=\"$head\"; docker compose -f docker-compose.baseline.yml run --build --rm baseline-runner",
]

[tasks.baseline-backfill-docker]
workspace = false
command = "bash"
args = [
	"-lc",
	"set -euo pipefail; head=\"$(git rev-parse HEAD)\"; if [ -n \"$(git status --porcelain)\" ]; then head=\"$head+dirty\"; fi; export ELF_BASELINE_ELF_HEAD=\"$head\"; export ELF_BASELINE_PROJECTS=\"${ELF_BASELINE_PROJECTS:-ELF}\"; export ELF_BASELINE_PROFILE=\"${ELF_BASELINE_PROFILE:-backfill}\"; export ELF_BASELINE_BACKFILL_DOCS=\"${ELF_BASELINE_BACKFILL_DOCS:-2000}\"; export ELF_BASELINE_ELF_TIMEOUT_SECONDS=\"${ELF_BASELINE_ELF_TIMEOUT_SECONDS:-3600}\"; export ELF_BASELINE_MAX_ELF_SECONDS=\"${ELF_BASELINE_MAX_ELF_SECONDS:-3600}\"; docker compose -f docker-compose.baseline.yml run --build --rm baseline-runner",
]

[tasks.baseline-live-report]
workspace = false
command = "bash"
args = [
	"scripts/live-baseline-report-to-md.sh",
]

[tasks.baseline-live-docker-clean]
workspace = false
command = "docker"
args = [
	"compose",
	"-f",
	"docker-compose.baseline.yml",
	"down",
	"-v",
	"--remove-orphans",
]

[tasks.baseline-production-synthetic]
workspace = false
command = "bash"
args = [
	"-lc",
	"set -euo pipefail; head=\"$(git rev-parse HEAD)\"; if [ -n \"$(git status --porcelain)\" ]; then head=\"$head+dirty\"; fi; selected_projects=\"$(printenv ELF_BASELINE_PROJECTS || true)\"; if [ -z \"$selected_projects\" ]; then selected_projects=\"ELF\"; fi; export ELF_BASELINE_ELF_HEAD=\"$head\"; export ELF_BASELINE_PROJECTS=\"$selected_projects\"; export ELF_BASELINE_PROFILE=production-synthetic; docker compose -f docker-compose.baseline.yml run --build --rm baseline-runner",
]

[tasks.baseline-production-private]
workspace = false
command = "bash"
args = [
	"-lc",
	"set -euo pipefail; manifest=\"$(printenv ELF_BASELINE_PRODUCTION_CORPUS_MANIFEST || true)\"; if [ -z \"$manifest\" ]; then echo \"ELF_BASELINE_PRODUCTION_CORPUS_MANIFEST is required for baseline-production-private\" >&2; exit 1; fi; head=\"$(git rev-parse HEAD)\"; if [ -n \"$(git status --porcelain)\" ]; then head=\"$head+dirty\"; fi; selected_projects=\"$(printenv ELF_BASELINE_PROJECTS || true)\"; if [ -z \"$selected_projects\" ]; then selected_projects=\"ELF\"; fi; export ELF_BASELINE_ELF_HEAD=\"$head\"; export ELF_BASELINE_PROJECTS=\"$selected_projects\"; export ELF_BASELINE_PROFILE=production-private; docker compose -f docker-compose.baseline.yml run --build --rm baseline-runner",
]


# Meta
# | task   | type      | cwd |
# | ------ | --------- | --- |
# | checks | composite |     |

[tasks.checks]
workspace = false
dependencies = [
	"lint",
	"test",
	"fmt-check",
]


# Quality utilities
# | task      | type    | cwd |
# | --------- | ------- | --- |
# | trace-gate | command |     |

[tasks.trace-gate]
workspace = false
command = "bash"
args = [
	"-lc",
	"set -euo pipefail; DSN=\"${TRACE_GATE_PG_DSN:-postgres://postgres:postgres@127.0.0.1:5432/elf}\"; psql \"${DSN}\" -v ON_ERROR_STOP=1 -f sql/init.sql; psql \"${DSN}\" -v ON_ERROR_STOP=1 -f .github/fixtures/trace_gate/fixture.sql; cargo run -p elf-eval --bin trace_regression_gate -- --config .github/fixtures/trace_gate/config.toml --gate .github/fixtures/trace_gate/gate.json --out tmp/trace_gate.report.json",
]
