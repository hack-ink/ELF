name: Language Checks

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'
  merge_group:
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  repo:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          cache: true
          rustflags: ''
          components: rustfmt, clippy

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Install cargo-make
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419
        with:
          tool: cargo-make

      - name: Install vibe-style (latest release)
        run: |
          set -euo pipefail
          VERSION="$(curl -fsSL https://api.github.com/repos/hack-ink/vibe-style/releases/latest | grep -oE '"tag_name": "v[^"]+"' | cut -d'"' -f4)"
          TARGET="x86_64-unknown-linux-gnu"
          ASSET="vibe-style-${TARGET}-${VERSION}.tgz"

          curl -fsSLO "https://github.com/hack-ink/vibe-style/releases/download/${VERSION}/${ASSET}"
          tar -xzf "${ASSET}"

          mkdir -p "$HOME/.cargo/bin"
          install -m 0755 "vibe-style-${TARGET}-${VERSION}/vstyle" "$HOME/.cargo/bin/vstyle"
          install -m 0755 "vibe-style-${TARGET}-${VERSION}/cargo-vstyle" "$HOME/.cargo/bin/cargo-vstyle"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install nextest
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419
        with:
          tool: nextest

      - name: Install taplo
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419
        with:
          tool: taplo

      - name: Run repository checks
        run: cargo make check
