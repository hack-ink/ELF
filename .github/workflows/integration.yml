name: Integration Tests

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "docs/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "docs/**"
  merge_group:
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "docs/**"
  workflow_dispatch:
  schedule:
    # Daily at 00:00 UTC. Manual runs use workflow_dispatch.
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  integration:
    name: Run integration tests
    runs-on: ubuntu-latest
    env:
      ELF_PG_DSN: postgres://postgres:postgres@127.0.0.1:5432/postgres
      ELF_QDRANT_HTTP_URL: http://127.0.0.1:6333
      ELF_QDRANT_GRPC_URL: http://127.0.0.1:6334
      ELF_QDRANT_URL: http://127.0.0.1:6334
      RUST_BACKTRACE: full
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.16.3
        ports:
          - 6333:6333
          - 6334:6334
    steps:
      - name: Fetch latest code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          cache: true
          rustflags: ''

      - name: Install nextest
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419
        with:
          tool: nextest

      - name: Install cargo-make
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419
        with:
          tool: cargo-make

      - name: Wait for Qdrant
        run: |
          for i in {1..30}; do
            curl -sSf http://127.0.0.1:6333/collections >/dev/null && exit 0
            sleep 1
          done
          echo "Qdrant did not become ready in time."
          exit 1

      - name: Run integration tests
        run: cargo make test-rust-all
