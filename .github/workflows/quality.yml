name: Quality Gates

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "docs/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "docs/**"
  merge_group:
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  trace-regression-gate:
    name: Trace regression gate
    runs-on: ubuntu-latest
    env:
      PG_DSN: postgres://postgres:postgres@127.0.0.1:5432/elf
      RUST_BACKTRACE: full
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: elf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d elf"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Fetch latest code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6
        with:
          cache: true
          rustflags: ''

      - name: Install cargo-make
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595
        with:
          tool: cargo-make

      - name: Install Postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres -d elf >/dev/null && exit 0
            sleep 1
          done
          echo "Postgres did not become ready in time."
          exit 1

      - name: Run trace regression gate
        run: TRACE_GATE_REPORT_PATH=trace_gate.report.json cargo make check-trace-gate

      - name: Upload trace gate report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trace_gate_report
          path: trace_gate.report.json
          if-no-files-found: warn
          retention-days: 7
