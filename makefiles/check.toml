# Rust workspace tasks: Check.

# Check
# | task             | type      | cwd |
# | ---------------- | --------- | --- |
# | check            | composite |     |
# | check-docs       | command   |     |
# | check-rust       | command   |     |
# | check-trace-gate | command   |     |
# | checks           | composite |     |

[tasks.check]
clear = true
workspace = false
dependencies = [
	"fmt-check",
	"check-docs",
	"check-rust",
	"lint",
	"test",
]

[tasks.check-docs]
workspace = false
command = "python3"
args = [
	"scripts/check-docs.py",
]

[tasks.check-rust]
workspace = false
command = "cargo"
args = [
	"check",
	"--workspace",
	"--all-targets",
	"--all-features",
]

[tasks.check-trace-gate]
workspace = false
command = "bash"
args = [
	"scripts/trace-gate.sh",
]

[tasks.checks]
workspace = false
dependencies = [
	"check",
]

# Clean
# | task                       | type    | cwd |
# | -------------------------- | ------- | --- |
# | clean-baseline-live-docker | command |     |
# | clean-parity-docker        | command |     |
