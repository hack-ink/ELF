	"--bin",
	"external_memory_pattern_radar",
	"--",
	"run",
	"--cursor",
	"apps/elf-eval/fixtures/external_memory_pattern_radar/cursor.json",
	"--out-cursor",
	"tmp/external-memory-pattern-radar/cursor.json",
	"--summary",
	"tmp/external-memory-pattern-radar/latest.md",
]

