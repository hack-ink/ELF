# Rust workspace tasks: Research.

[tasks.external-memory-radar]
workspace = false
command = "cargo"
args = [
	"run",
	"-p",
	"elf-eval",
	"--bin",
	"external_memory_pattern_radar",
	"--",
	"run",
	"--cursor",
	"apps/elf-eval/fixtures/external_memory_pattern_radar/cursor.json",
	"--summary",
	"docs/evidence/external_memory_pattern_radar_latest.md",
]

[tasks.external-memory-radar-artifact]
workspace = false
dependencies = [
	"external-memory-radar-artifact-json",
	"external-memory-radar-artifact-validate",
]

[tasks.external-memory-radar-artifact-json]
workspace = false
command = "cargo"
